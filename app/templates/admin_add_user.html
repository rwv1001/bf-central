{% extends "base.html" %}
{% block title %}Add User – bf-central{% endblock %}
{% block content %}
<h1>Add User</h1>
<div class="card" style="max-width:600px;">
  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}
  <form method="post">
    <div class="form-group">
      <label for="email">Email *</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label for="first_name">First name</label>
        <input type="text" id="first_name" name="first_name">
      </div>
      <div class="form-group">
        <label for="last_name">Last name</label>
        <input type="text" id="last_name" name="last_name">
      </div>
    </div>
    <div class="form-group">
      <label for="phone_number">Phone number</label>
      <input type="text" id="phone_number" name="phone_number">
    </div>
    <div class="form-group">
      <label for="allowed_vlans">Allowed VLANs <span class="text-muted">(comma-separated IDs, e.g. 30,40)</span></label>
      <input type="text" id="allowed_vlans" name="allowed_vlans" placeholder="e.g. 30,40">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label for="begin_date">Valid from *</label>
        <input type="date" id="begin_date" name="begin_date" value="{{ today }}" required>
      </div>
      <div class="form-group">
        <label for="expiry_date">Expires <span class="text-muted">(leave blank = no expiry)</span></label>
        <input type="date" id="expiry_date" name="expiry_date">
      </div>
    </div>
    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes"></textarea>
    </div>
    <div style="display:flex;gap:.8rem;">
      <button type="submit" class="btn btn-primary">Save User</button>
      <a class="btn btn-secondary" href="{{ url_for('admin_users') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
